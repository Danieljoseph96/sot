{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

<div class="card shadow border-0 rounded-4">
<div class="card-body">

<h3 class="fw-bold text-success mb-4">
Bulk ID Card Generator
</h3>

<form method="POST">
{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Paper Size</label>
<select name="paper_size" class="form-select">
<option value="A4">A4</option>
<option value="A3">A3</option>
<option value="LEGAL">Legal</option>
<option value="LETTER">Letter</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Orientation</label>
<select name="orientation" class="form-select">
<option value="portrait">Portrait</option>
<option value="landscape">Landscape</option>
</select>
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Font Size</label>
<input type="number" name="font_size" value="12" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Top Space (cm)</label>
<input type="text" name="top_space" value="2.1" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Left Gap (cm)</label>
<input type="text" name="left_space" value="0.6" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Right Gap (cm)</label>
<input type="text" name="right_space" value="0.6" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label class="form-label">Row Gap</label>
<input type="text" name="row_gap" value="2" class="form-control">
</div>

</div>

<div class="alert alert-info">
Preview = open in browser<br>
Export = download PDF
</div>

<button type="submit" name="action" value="preview"
class="btn btn-primary btn-lg me-2">
Preview
</button>

<button type="submit" name="action" value="export"
class="btn btn-success btn-lg">
Export PDF
</button>

</form>

</div>
</div>

</div>

{% endblock %}
